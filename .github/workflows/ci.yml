name: RetroForge CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Clean Install Dependencies
      run: npm ci
      
    - name: TypeScript Compile Check
      run: npm run lint
      
    - name: Build Application Payload
      run: npm run build
      
    - name: Build SDK Artifacts
      run: npm run build:sdk
      
    - name: Generate Security Report (Snyk)
      # In a real environment, uncomment this and add SNYK_TOKEN
      # uses: snyk/actions/node@master
      # env:
      #   SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: echo "Security check mocked"

  docker-image:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker Image
      run: docker build -t retroforge/app:latest .
      
    - name: Run Trivy vulnerability scanner
      # uses: aquasecurity/trivy-action@master
      # with:
      #   image-ref: 'retroforge/app:latest'
      #   format: 'table'
      #   exit-code: '1'
      #   ignore-unfixed: true
      #   vuln-type: 'os,library'
      #   severity: 'CRITICAL,HIGH'
      run: echo "Vulnerability scanner mocked"
